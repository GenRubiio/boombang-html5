version: "3.9"
services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/db/init/create_databases.sql:/docker-entrypoint-initdb.d/create_databases.sql
    networks:
      - boombang

  proxy:
    image: jwilder/nginx-proxy:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - boombang

  api:
    build: ./api
    env_file:
      - ./api/.env
    environment:
      VIRTUAL_HOST: api.boombang.com
      VIRTUAL_PORT: 80
      VIRTUAL_PROTO: http
      APP_URL: http://api.boombang.com
      DB_HOST: db
    depends_on:
      - db
      - proxy
    ports:
      - "8000:80"
    expose:
      - "80"
    labels:
      - "VIRTUAL_HOST=api.boombang.com"
    command: >
      sh -c "until php artisan migrate --force --no-interaction --seed; do echo 'Migration attempt failed, retrying in 3 seconds...'; sleep 3; done; php -S 0.0.0.0:80 -t public"
    networks:
      boombang:
        aliases:
          - api.boombang.com

  web:
    build: ./web
    env_file:
      - ./web/.env
    environment:
      VIRTUAL_HOST: boombang.com
      VIRTUAL_PORT: 80
      VIRTUAL_PROTO: http
      APP_URL: http://boombang.com
      DB_HOST: db
    depends_on:
      - db
      - proxy
    ports:
      - "8001:80"
    expose:
      - "80"
    labels:
      - "VIRTUAL_HOST=boombang.com"
    command: >
      sh -c "until php artisan migrate --force --no-interaction --seed; do echo 'Migration attempt failed, retrying in 3 seconds...'; sleep 3; done; php -S 0.0.0.0:80 -t public"
    networks:
      boombang:
        aliases:
          - boombang.com

  server:
    build: ./server
    env_file:
      - ./server/.env
    environment:
      VIRTUAL_HOST: server.boombang.com
      VIRTUAL_PORT: 3000
      VIRTUAL_PROTO: http
      DB_HOST: db
      API_URL: http://api.boombang.com
      CLIENT_URL: http://play.boombang.com
      EMULATOR_URL: http://server.boombang.com:3000
    depends_on:
      - db
      - api
      - proxy
    ports:
      - "3000:3000"
    expose:
      - "3000"
    labels:
      - "VIRTUAL_HOST=server.boombang.com"
    networks:
      boombang:
        aliases:
          - server.boombang.com

  client:
    build: ./client
    env_file:
      - ./client/.env
    environment:
      VIRTUAL_HOST: play.boombang.com
      VIRTUAL_PORT: 5173
      VIRTUAL_PROTO: http
      VITE_SERVER_URL: http://server.boombang.com:3000
    depends_on:
      - server
      - proxy
    expose:
      - "5173"
    labels:
      - "VIRTUAL_HOST=play.boombang.com"
    networks:
      boombang:
        aliases:
          - play.boombang.com

volumes:
  dbdata:

networks:
  boombang:
