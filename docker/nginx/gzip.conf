# ./docker/nginx/gzip.conf
gzip on;
gzip_comp_level 6;
gzip_min_length 256;
gzip_vary on;
gzip_proxied any;

# Tipos comunes (HTML, CSS, JS, JSON, SVG, fuentes…)
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/x-javascript
  application/json
  application/xml
  application/rss+xml
  application/atom+xml
  image/svg+xml
  font/ttf
  font/otf
  font/woff
  font/woff2;

# Opcional: si generas assets .gz en disco
# gzip_static on;
